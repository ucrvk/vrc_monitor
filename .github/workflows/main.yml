name: Beta APK Pre-release

on:
    push:
        branches:
            - beta
        paths:
            - version.json

permissions:
    contents: write

jobs:
    build-and-release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup Java
              uses: actions/setup-java@v4
              with:
                  distribution: temurin
                  java-version: "17"

            - name: Setup Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: stable
                  cache: true

            - name: Install dependencies
              run: flutter pub get

            - name: Read version from version.json
              id: version
              shell: bash
              run: |
                  VERSION=$(python3 - <<'PY'
                  import json
                  with open("version.json", "r", encoding="utf-8") as f:
                      data = json.load(f)
                  print(data["version"])
                  PY
                  )
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Decode keystore
              shell: bash
              run: |
                  echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

            - name: Create key.properties
              shell: bash
              run: |
                  cat > android/key.properties <<EOF
                  storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
                  keyPassword=${{ secrets.ANDROID_STORE_PASSWORD }}
                  keyAlias=${{ vars.ANDROID_KEY_ALIAS }}
                  storeFile=upload-keystore.jks
                  EOF

            - name: Build signed APKs
              run: flutter build apk --release --split-per-abi

            - name: Find previous beta tag
              id: prev_tag
              shell: bash
              run: |
                  git fetch --tags
                  PREV_TAG=$(git tag --sort=-version:refname | grep '^[0-9].*beta.*' | grep -vx "${{ steps.version.outputs.tag }}" | head -n 1 || true)
                  echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

            - name: Create release notes
              shell: bash
              run: |
                  if [ -n "${{ steps.prev_tag.outputs.prev_tag }}" ]; then
                    cat > release_notes.md <<EOF
                  Auto build from beta branch because version.json changed.

                  Full Changelog: ${{ steps.prev_tag.outputs.prev_tag }}...${{ steps.version.outputs.tag }}
                  EOF
                  else
                    cat > release_notes.md <<EOF
                  Auto build from beta branch because version.json changed.
                  EOF
                  fi

            - name: Create GitHub pre-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ steps.version.outputs.tag }}" \
                    build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
                    build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
                    build/app/outputs/flutter-apk/app-x86_64-release.apk \
                    --target beta \
                    --title "${{ steps.version.outputs.tag }}" \
                    --notes-file release_notes.md \
                    --prerelease
